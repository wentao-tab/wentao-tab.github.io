<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>个人档案柜 · 文韬奇物录</title>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    .subpage {
      max-width: 980px;
      margin: 0 auto;
      padding: 56px 22px 80px;
    }

    .subpage-card {
      border: 2px solid #000;
      background: #fffdf7;
      padding: clamp(24px, 5vw, 56px);
    }

    .subpage-kicker {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .subpage h1 {
      font-family: var(--display);
      font-size: clamp(38px, 6vw, 78px);
      line-height: 1.05;
      margin: 0 0 24px;
    }

    .subpage p {
      font-size: 19px;
      line-height: 1.75;
      max-width: 760px;
    }

    .back-home {
      display: inline-block;
      margin-top: 28px;
      border: 2px solid #000;
      padding: 11px 18px;
      font-family: var(--sans);
      font-weight: 800;
      color: #000;
      text-decoration: none;
      background: #fff;
    }

    .back-home:hover {
      background: #000;
      color: #fff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="subpage">
    <article class="subpage-card">
      <div class="subpage-kicker">PERSONAL ARCHIVE / 个人档案柜</div>

      <h1>把思考、影像与碎片放进同一个个人档案柜</h1>

      <p>
        这里是这个网站的入口说明页。它像一个私人档案柜，用来收纳长期思考、影像记录、软件工具、作品项目，以及一路上捡到的灵感碎片。
      </p>

      <p>
        它不完全按照时间排列，而是按照好奇心、主题和记忆的线索重新归档。你可以把这里理解成一个可翻阅的桌面，也可以理解成一个慢慢扩展的个人索引。
      </p>

      <a class="back-home" href="./">← 返回首页</a>
    </article>
  </main>
</body>
</html>
